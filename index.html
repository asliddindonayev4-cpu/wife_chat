<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oila Chati - Eri</title>
    <script src="https://8x8.vc/vpaas-magic-cookie-8877665544332211/external_api.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: black; margin: 0; }
        .chat-container { max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: #fff; }
        header { padding: 15px; background: #075e54; color: white; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #f0f2f5; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sent { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #fff; border-bottom-left-radius: 2px; }
        .chat-img, .chat-vid { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; }
        .input-area { display: flex; padding: 10px; background: #eee; align-items: center; }
        #msgInput { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        .call-btn { background: #25d366; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px; }
        .media-btn { font-size: 26px; cursor: pointer; margin-right: 12px; color: #075e54; }
        #video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; display: none; background: #000; }
        .close-call { position: absolute; top: 20px; right: 20px; z-index: 1000; background: red; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="video-container">
        <button class="close-call" onclick="closeCall()">Tugatish ❌</button>
        <div id="jitsi-container" style="height: 100%"></div>
    </div>
    
    <div class="chat-container">
        <header>
            <span>Hotinim</span>
            <button class="call-btn" onclick="startCall()">📞</button>
        </header>
        <div id="chatBox" class="chat-box"></div>
        <div class="input-area">
            <label for="fileInput" class="media-btn">🖼️</label>
            <input type="file" id="fileInput" style="display:none" accept="image/*,video/*">
            <input type="text" id="msgInput" placeholder="Xabar yozing...">
            <button onclick="sendMsg()" style="border:none; background:none; font-size:26px; cursor:pointer; margin-left: 5px;">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBg3gwfAr7Rkp9hAZxgbJeDdEIf2WZL1yU",
            authDomain: "chat-cb6f4.firebaseapp.com",
            databaseURL: "https://chat-cb6f4-default-rtdb.firebaseio.com",
            projectId: "chat-cb6f4",
            storageBucket: "chat-cb6f4.firebasestorage.app",
            messagingSenderId: "167580376836",
            appId: "1:167580376836:web:b0677a4359eb839daaba51"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");
        const USER_ROLE = "Eri"; // BU YERDA "Eri" BO'LIB QOLADI

        window.sendMsg = function() {
            const input = document.getElementById('msgInput');
            if (input.value.trim()) {
                push(chatRef, { sender: USER_ROLE, type: 'text', text: input.value, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
                input.value = "";
            }
        }

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'ml_default');

            const res = await fetch('https://api.cloudinary.com/v1_1/demo/image/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            push(chatRef, {
                sender: USER_ROLE,
                type: file.type.includes('image') ? 'image' : 'video',
                url: data.secure_url,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
        };

        onChildAdded(chatRef, (snapshot) => {
            const msg = snapshot.val();
            const div = document.createElement('div');
            div.className = `msg ${msg.sender === USER_ROLE ? 'sent' : 'received'}`;
            
            if (msg.type === 'text') div.innerHTML = `<strong>${msg.sender}:</strong><br>${msg.text}<br><small style="font-size:10px; color:#888">${msg.time || ''}</small>`;
            else if (msg.type === 'image') div.innerHTML = `<strong>${msg.sender}:</strong><br><img src="${msg.url}" class="chat-img" onclick="window.open('${msg.url}')">`;
            else if (msg.type === 'video') div.innerHTML = `<strong>${msg.sender}:</strong><br><video src="${msg.url}" controls class="chat-vid">`;
            
            document.getElementById('chatBox').appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        window.startCall = function() {
            document.getElementById('video-container').style.display = 'block';
            window.api = new JitsiMeetExternalAPI("meet.jit.si", {
                roomName: "OilaChati_Xona_777",
                parentNode: document.querySelector('#jitsi-container'),
                userInfo: { displayName: USER_ROLE }
            });
        }

        window.closeCall = function() {
            if(window.api) window.api.dispose();
            document.getElementById('video-container').style.display = 'none';
        }
    </script>
</body>
</html>
