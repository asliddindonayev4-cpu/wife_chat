<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <title>Eri-Xotini Chat</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: black;
            margin: 0;
        }

        .chat-container {
            max-width: 500px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        header {
            padding: 15px;
            background: #075e54;
            color: white;
            text-align: center;
            font-weight: bold;
        }

        /* Xabarlar maydoni */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        /* Xabar pufakchasi */
        .msg-card {
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 75%;
            word-wrap: break-word;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
            position: relative;
            color: red !important;
            /* MATN RANGI QORA */
        }

        .sent {
            align-self: flex-end;
            background: #dcf8c6;
        }

        /* Eri yuborgani */
        .received {
            align-self: flex-start;
            background: #ffffff;
        }

        /* Xotini yuborgani */

        .sender-name {
            font-size: 11px;
            font-weight: bold;
            color: #27ae60;
            margin-bottom: 2px;
        }

        .text-content {
            font-size: 15px;
            line-height: 1.4;
            color: #000;
        }

        /* Qora rang */
        .time-stamp {
            font-size: 10px;
            color: #666;
            text-align: right;
            margin-top: 4px;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #f0f0f0;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 20px;
            font-size: 15px;
        }

        button {
            background: #075e54;
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            margin-left: 10px;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <header>OILAVIY CHAT ❤️</header>
        <div id="chatBox" class="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Xabar yozing..."
                onkeypress="if(event.key==='Enter') sendMsg()">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBg3gwfAr7Rkp9hAZxgbJeDdEIf2WZL1yU",
            authDomain: "chat-cb6f4.firebaseapp.com",
            databaseURL: "https://chat-cb6f4-default-rtdb.firebaseio.com",
            projectId: "chat-cb6f4",
            storageBucket: "chat-cb6f4.firebasestorage.app",
            messagingSenderId: "167580376836",
            appId: "1:167580376836:web:b0677a4359eb839daaba51"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "messages");

        // Kimligini shu yerdan o'zgartirasiz
        const USER_ROLE = "Eri";

        function sendMsg() {
            const msgInput = document.getElementById('msgInput');
            const text = msgInput.value.trim();
            if (text !== "") {
                push(chatRef, {
                    sender: USER_ROLE,
                    text: text,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
                msgInput.value = "";
            }
        }

        document.getElementById('sendBtn').onclick = sendMsg;

        onChildAdded(chatRef, (snapshot) => {
            const msg = snapshot.val();
            const chatBox = document.getElementById('chatBox');
            const isMe = msg.sender === USER_ROLE;

            const msgHTML = `
                <div class="msg-card ${isMe ? 'sent' : 'received'}">
                    <div class="sender-name">${msg.sender}</div>
                    <div class="text-content">${msg.text}</div>
                    <div class="time-stamp">${msg.time}</div>
                </div>`;

            chatBox.insertAdjacentHTML('beforeend', msgHTML);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>

</html>
